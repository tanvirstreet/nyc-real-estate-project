# GitHub Pages Configuration
theme: minima
title: The Autonomous Real Estate Agent
description: AI-Powered SaaS Platform for Real Estate Professionals
author: Your Name

# Tell GitHub Pages to look in the docs directory
include:
  - docs

# Markdown processing
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true

# Plugins
plugins:
  - jekyll-coffeescript
  - jekyll-gist
  - jekyll-mentions
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

# Minima theme settings
minima:
  date_format: "%Y-%m-%d"

# Social media (optional)
twitter_username: your_twitter
github_username: tanvir-bk

# Navigation (sidebar structure)
sidebar:
  - title: "Overview"
    children:
      - title: "Home"
        url: /
      - title: "Business Requirements"
        url: /docs/requirement/BRD.html
  - title: "Planning"
    children:
      - title: "Architecture"
        url: /docs/planning/01-architecture/
        children:
          - title: "System Architecture"
            url: /docs/planning/01-architecture/system-architecture.html
          - title: "SaaS Tenancy Model"
            url: /docs/planning/01-architecture/saas-tenancy-model.html
      - title: "Technology Stack"
        url: /docs/planning/02-technology-stack/
        children:
          - title: "Tech Stack"
            url: /docs/planning/02-technology-stack/tech-stack.html
      - title: "Infrastructure"
        url: /docs/planning/03-infrastructure/
        children:
          - title: "Infrastructure Overview"
            url: /docs/planning/03-infrastructure/infrastructure.html
          - title: "Cost Analysis"
            url: /docs/planning/03-infrastructure/cost-analysis.html
      - title: "Implementation"
        url: /docs/planning/04-phased-implementation/
        children:
          - title: "Implementation Plan"
            url: /docs/planning/04-phased-implementation/implementation-plan.html
          - title: "Sprint 0: Foundation"
            url: /docs/planning/04-phased-implementation/sprint-0-foundation.html
          - title: "Sprint 1: Digital Hub"
            url: /docs/planning/04-phased-implementation/sprint-1-phase1-digital-hub.html
          - title: "Sprint 2: CRM & Leads"
            url: /docs/planning/04-phased-implementation/sprint-2-phase2-crm.html
          - title: "Sprint 3: Nurture"
            url: /docs/planning/04-phased-implementation/sprint-3-phase3-nurture.html
          - title: "Sprint 4: Content"
