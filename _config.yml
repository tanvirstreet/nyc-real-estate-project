# GitHub Pages Configuration
remote_theme: just-the-docs/just-the-docs
title: The Autonomous Real Estate Agent
description: AI-Powered SaaS Platform for Real Estate Professionals
author: Your Name

# Tell GitHub Pages to look in the docs directory
include:
  - docs

# Markdown processing
markdown: kramdown
kramdown:
  syntax_highlighter_opts:
    disable: true

# Plugins
plugins:
  - jekyll-remote-theme
  - jekyll-coffeescript
  - jekyll-gist
  - jekyll-mentions
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links

# Just the Docs theme settings
# Navigation is automatically generated from folder structure
just-the-docs:
  # Enable or disable the search feature
  search_enabled: true

  # Set the heading level for the sidebar navigation
  heading_level: 2

  # Enable or disable heading anchors
  heading_anchors: true

  # Aux links for the upper right navigation
  aux_links:
    "View on GitHub":
      - "//github.com/tanvir-bk/nyc-real-estate"

# Social media (optional)
twitter_username: your_twitter
github_username: tanvir-bk

# GitHub Pages will display the natural folder structure on the left sidebar
# No custom navigation needed - folder structure is automatically shown

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .gitignore
  - .claude/
  - LICENSE
  - README.md
  - package.json
  - package-lock.json
