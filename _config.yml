          - title: "Integration Overview"
            url: /docs/planning/05-integration-architecture/integration-overview.html
          - title: "API Contracts"
            url: /docs/planning/05-integration-architecture/api-contracts.html
      - title: "Data & Monitoring"
        url: /docs/planning/06-data-monitoring/
        children:
          - title: "Data Architecture"
            url: /docs/planning/06-data-monitoring/data-architecture.html
